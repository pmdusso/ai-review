name: AI Review
on: [pull_request]
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install tools
        run: |
          # Setup minimal agents (e.g. Qwen via API, or gemini via API)
          # Assuming CLI availability...
          echo "Installing dependencies..."
      - name: Run ai-review on changed files
        run: |
          git diff origin/${{ github.base_ref }} HEAD > pr.diff
          if [[ -s pr.diff ]]; then
            ./ai-review -s "Review this PR diff for bugs and security issues." < pr.diff -o review.md
          else
            echo "No changes found to review." > review.md
          fi
      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });
